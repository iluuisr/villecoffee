<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ville's Coffee - Início</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <svg class="svg-defs">
    <defs>
      <clipPath id="wave-mask" clipPathUnits="objectBoundingBox">
        <path d="M0,0 L0.85,0 C0.95,0.15,0.75,0.3,0.9,0.45 C1,0.6,0.8,0.75,0.95,0.9 C1,0.95,0.9,1,0.85,1 L0,1 Z"></path>
      </clipPath>
    </defs>
  </svg>

  <header>
    <h1>Ville's Coffee</h1>
  </header>

  <button id="btn-menu">☰ MENU</button>

  <aside class="sidebar" id="sidebar">
    <div style="font-size: 40px;">☕</div>
    <h2>Explorar</h2>
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="cardapio.html">Cardápio</a></li>
      <li><a href="livraria.html">Livraria</a></li>
      <li><a href="areaverde.html">Área Verde</a></li>
      <li><a href="sobrenos.html">Sobre Nós</a></li>
    </ul>
  </aside>

  <main class="content">
    <h2>Bem-vindo à Página Inicial</h2>
    <p>Escolha uma opção no menu lateral para navegar pelo Ville's.</p>
    
  </main>

  <script>
    const btnMenu = document.getElementById('btn-menu');
    const sidebar = document.getElementById('sidebar');

    btnMenu.addEventListener('click', (e) => {
      e.stopPropagation(); 
      sidebar.classList.toggle('active');
    });

    document.addEventListener('click', (event) => {
      if (!sidebar.contains(event.target) && !btnMenu.contains(event.target)) {
        sidebar.classList.remove('active');
      }
    });
  </script>
</body>
</html>
